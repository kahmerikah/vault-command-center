name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint backend (ruff)
        run: |
          pip install ruff --quiet
          ruff check backend/ --ignore E501 || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            echo "=== Deploying SOMB Vault ==="
            cd ~/vault/vault-command-center

            # Backup local config
            cp .env .env.deploy-backup-$(date +%F-%H%M%S) 2>/dev/null || true
            cp nginx/nginx.conf nginx/nginx.conf.deploy-backup-$(date +%F-%H%M%S) 2>/dev/null || true

            # Pull latest code
            git fetch origin
            git reset --hard origin/master

            # Restore local config (not in repo)
            ls -t .env.deploy-backup-* 2>/dev/null | head -1 | xargs -I{} cp {} .env || true
            ls -t nginx/nginx.conf.deploy-backup-* 2>/dev/null | head -1 | xargs -I{} cp {} nginx/nginx.conf || true

            # Build and restart containers
            docker compose build --no-cache backend worker frontend
            docker compose up -d --force-recreate backend worker frontend nginx

            # Wait for backend to be healthy
            sleep 10
            curl -sf http://localhost/api/v1/health || echo "Health check pending..."

            echo "=== Deployment complete ==="

      - name: Notify deployment
        if: success()
        run: |
          echo "Deployment successful at $(date -u)"

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment FAILED at $(date -u)"
          exit 1
