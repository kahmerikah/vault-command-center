# HTTP redirect to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Frontend (Vault UI) - HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name vault.soleonmyback.us admin.soleonmyback.us www.soleonmyback.us;

    ssl_certificate /etc/letsencrypt/live/soleonmyback.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soleonmyback.us/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    resolver 127.0.0.11 valid=10s ipv6=off;
    add_header Permissions-Policy "browsing-topics=()" always;

    set $backend http://backend:5000;
    set $frontend http://frontend:80;

    location = /favicon.ico {
        return 204;
    }

    # Keep frontend and API same-origin for browser auth requests.
    location /socket.io/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# API Backend - HTTPS
