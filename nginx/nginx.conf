# Root domain redirect
server {
    listen 443 ssl;
    http2 on;
    server_name soleonmyback.us;

    ssl_certificate /etc/letsencrypt/live/soleonmyback.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soleonmyback.us/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://vault.soleonmyback.us$request_uri;
}
