upstream vault_frontend {
    server frontend:80;
}

upstream vault_backend {
    server backend:5000;
}

server {
    listen 80;
    server_name vault.soleonmyback.us admin.soleonmyback.us vault.negreauxtech.com admin.negreauxtech.com vault.negreauxtech.org admin.negreauxtech.org vault.negreaux.com admin.negreaux.com;

    location / {
        proxy_pass http://vault_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.soleonmyback.us booking.soleonmyback.us arcade.soleonmyback.us api.negreauxtech.com booking.negreauxtech.com arcade.negreauxtech.com api.negreauxtech.org booking.negreauxtech.org arcade.negreauxtech.org api.negreaux.com booking.negreaux.com arcade.negreaux.com;

    location /socket.io/ {
        proxy_pass http://vault_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://vault_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name soleonmyback.us www.soleonmyback.us negreauxtech.com www.negreauxtech.com negreauxtech.org www.negreauxtech.org negreaux.com www.negreaux.com;
    return 301 http://vault.soleonmyback.us$request_uri;
}
