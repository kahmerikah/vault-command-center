upstream vault_frontend {
    server frontend:80;
}

upstream vault_backend {
    server backend:5000;
}

server {
    listen 80;
    server_name vault.YOURSITE.com admin.YOURSITE.com;

    location / {
        proxy_pass http://vault_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.YOURSITE.com booking.YOURSITE.com arcade.YOURSITE.com;

    location /socket.io/ {
        proxy_pass http://vault_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://vault_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name YOURSITE.com www.YOURSITE.com;
    return 301 http://vault.YOURSITE.com$request_uri;
}
